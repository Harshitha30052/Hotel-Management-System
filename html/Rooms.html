<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Room</title>
  <link rel="stylesheet" href="../css/hotel.css" />
  <style>
    .profile_pic {
    position: relative;
    width: 45px;
    height: 45px;
    cursor: pointer;
}
.profile_pic img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid white;
    object-fit: cover;
}
.profile_dropdown {
    display: none;
    position: absolute;
    top: 55px;
    right: 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    border-radius: 5px;
    overflow: hidden;
    z-index: 2000;
    min-width: 140px;
}
.profile_dropdown a {
    display: block;
    padding: 10px 15px;
    color: #333;
    text-decoration: none;
    font-size: 14px;
}
.profile_dropdown a:hover {
    background-color: #ec407a;
    color: white;
}

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="nav_bar">
    <div class="logo"></div>

    <div class="nav_menu">
      <ul>
        <li><a href="../html/hotel.html">Home</a></li>
        <li><a href="../html/hotel.html#footer">About Us</a></li>
        <li><a href="../html/hotel.html#footer">Contact Us</a></li>
        <li><a href="../html/random.html">Logout</a></li>
        <li><a href="../php/Hotels.php">Packages</a></li>
        <li><a href="../html/Food.html">Meals</a></li>
        <li><a href="../php/favorites.php">Favorites</a></li>
      </ul>
    </div>

    <div class="nav_but">
      <button class="batton">Book Now</button>
    </div>
    <div class="profile_pic">
        <img src="../images/profile.jpg" alt="Profile" id="profileToggle">
        <div class="profile_dropdown" id="profileDropdown">
            <a href="../php/my_orders.php">My Orders</a>
            <a href="../php/logout.php">Logout</a>
        </div>
      </div>
  </div>

  <br><br><br>

  <!-- HOTEL NAME -->
  <h1 id="hotel-name" style="text-align:center">Hotel Name</h1>

  <!-- ROOM BOXES -->
  <div class="room_div">

    <!-- Single Room -->
    <div class="room">
      <div class="rom">
        <div class="type1"></div><br>
        <div class="room_title">
          <h2>Single Room</h2>
          <h3 id="single-price"></h3>
          <button class="book_room" onclick="bookRoom(this,'single')">Click to Book</button>
        </div>
      </div>
    </div>

    <!-- Double Room -->
    <div class="room">
      <div class="rom">
        <div class="type2"></div><br>
        <div class="room_title">
          <h2>Double Room</h2>
          <h3 id="double-price"></h3>
          <button class="book_room" onclick="bookRoom(this,'double')">Click to Book</button>
        </div>
      </div>
    </div>

    <!-- Deluxe Room -->
    <div class="room">
      <div class="rom">
        <div class="type3"></div><br>
        <div class="room_title">
          <h2>Deluxe Room</h2>
          <h3 id="deluxe-price"></h3>
          <button class="book_room" onclick="bookRoom(this,'deluxe')">Click to Book</button>
        </div>
      </div>
    </div>

  </div>

<script>

// Hotel list with prices
const hotels = {
  "The Park Hyderabad": { "single": 9000, "double": 14000, "deluxe": 20000 },
  "Taj Hotel":          { "single": 12000, "double": 16000, "deluxe": 21000 },
  "Lemon Tree":         { "single": 8000, "double": 13000, "deluxe": 18000 },
  "Taj Krishna":        { "single": 10000, "double": 16000, "deluxe": 20000 },
  "Taj Deccan":         { "single": 10000, "double": 16000, "deluxe": 20000 },
  "Ibis Hotel":         { "single": 10000, "double": 16000, "deluxe": 20000 },
  "Trident Hotel":      { "single": 8000, "double": 13000, "deluxe": 18000 },
  "Golconda Hotel":     { "single": 7000, "double": 10000, "deluxe": 12000 }
};

// Read selected hotel from URL
const urlParams = new URLSearchParams(window.location.search);
const selectedHotel = decodeURIComponent(urlParams.get('hotel') || "").trim();

if (!selectedHotel || !hotels[selectedHotel]) {
  alert("Invalid hotel selected.");
  window.location.href = "Hotels.html";
}

// Show hotel name
document.getElementById("hotel-name").innerText = selectedHotel;

// Display prices
document.getElementById("single-price").innerText  = `Price: ₹${hotels[selectedHotel].single}`;
document.getElementById("double-price").innerText  = `Price: ₹${hotels[selectedHotel].double}`;
document.getElementById("deluxe-price").innerText  = `Price: ₹${hotels[selectedHotel].deluxe}`;


// ----------------------------
// BOOK ROOM FUNCTION
// ----------------------------
function bookRoom(button, roomType) {

  // Disable other room buttons
  document.querySelectorAll('.book_room').forEach(btn => {
    if (btn !== button) btn.disabled = true;
  });

  button.innerText = "Booked";
  button.style.backgroundColor = "green";
  button.style.color = "white";

  const hotelName = selectedHotel;
  const roomTitle = button.previousElementSibling.previousElementSibling.innerText;
  const roomPrice = hotels[hotelName][roomType];

  // Store values in localStorage
  localStorage.setItem("selectedHotel", hotelName);
  localStorage.setItem("roomType", roomTitle);
  localStorage.setItem("roomPrice", roomPrice);

  // Confirmation
  const confirmBooking = confirm(
    `Hotel: ${hotelName}\nRoom: ${roomTitle}\nPrice: ₹${roomPrice}\n\nProceed to summary?`
  );

  if (confirmBooking) {
    // Redirect correctly (ONLY ONCE)
    window.location.href =
      `../php/Summary.php?roomType=${encodeURIComponent(roomType)}&roomPrice=${encodeURIComponent(roomPrice)}&hotelName=${encodeURIComponent(hotelName)}`;
  } else {
    // Reset UI on cancel
    button.innerText = "Click to Book";
    button.style.backgroundColor = "";
    button.style.color = "";
    document.querySelectorAll('.book_room').forEach(btn => btn.disabled = false);
  }
}
const profileToggle = document.getElementById("profileToggle");
const profileDropdown = document.getElementById("profileDropdown");

profileToggle.addEventListener("click", () => {
    profileDropdown.style.display = profileDropdown.style.display === "block" ? "none" : "block";
});

window.addEventListener("click", (e) => {
    if (!profileToggle.contains(e.target) && !profileDropdown.contains(e.target)) {
        profileDropdown.style.display = "none";
    }
});

</script>

</body>
</html>
